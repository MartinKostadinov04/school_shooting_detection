# YAMNet embedding pipeline configuration
# Used by: pipeline/extract_embeddings.py, pipeline/split_dataset.py
#
# NOTE: These settings govern the YAMNet audio classification pipeline only.
# The separate CNN experiment uses pipeline/config.py (mel spectrogram params).
# Do NOT mix these two configurations.

yamnet_url: "https://tfhub.dev/google/yamnet/1"

# Audio preprocessing contract (must match YAMNet's input requirements)
sample_rate: 16000              # Hz — YAMNet requires exactly 16 kHz
clip_length_samples: 32000      # samples = 2.0 seconds at 16 kHz
min_clip_samples: 8000          # samples = 0.5 seconds — below this, warn and flag

# Data quality thresholds
silence_threshold: 1.0e-6       # max abs amplitude below which clip is "nearly silent"

# AudioSet class index for zero-shot baseline.
# NOTE: The actual index is resolved dynamically at runtime via
# resolve_gunshot_class_idx() in pipeline/extract_embeddings.py — this value
# is informational only. The bundled class map places "Gunshot, gunfire" at
# index 421, not 427 as some external references claim.
gunshot_audioset_class_idx: 421  # "Gunshot, gunfire" in AudioSet ontology

# Paths (relative to project root)
data:
  raw_dir: "data/raw"
  embeddings_dir: "data/processed/embeddings"
  splits_dir: "data/processed/splits"

# Dataset split ratios
splits:
  train: 0.70
  val: 0.15
  test: 0.15
  random_state: 42

# ---------------------------------------------------------------------------
# Modal cloud compute
# ---------------------------------------------------------------------------
# Used by: pipeline/modal_extract.py
#
# API credentials — store the env var NAMES here, never the actual values.
# Set the real tokens in your shell before running:
#   export MODAL_TOKEN_ID="your-token-id"
#   export MODAL_TOKEN_SECRET="your-token-secret"
# Or authenticate once via the CLI: modal token new
modal:
  token_id_env: "MODAL_TOKEN_ID"
  token_secret_env: "MODAL_TOKEN_SECRET"
  app_name: "gunshot-detection-extraction"
  volume_name: "gunshot-data"

  # GPU — Modal available options: T4, L4, A10G, A100-40GB, A100-80GB, H100
  # Note: T1000 is a workstation GPU not available on Modal; T4 is the entry-level datacenter equivalent.
  gpu: "T4"

  # Resource limits
  timeout_seconds: 7200    # 2 hours — enough for 24k clips
  memory_mb: 16384         # 16 GB RAM

  # Parallel WAV prefetch threads inside the container
  workers: 8

  # Remote paths inside the Modal volume (mounted at /vol)
  volume_mount: "/vol"
  remote_data_dir: "/vol"
  remote_output_dir: "/vol/embeddings"
